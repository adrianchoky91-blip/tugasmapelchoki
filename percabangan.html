<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasir Mini Market</title>

<style>
body {
    margin: 0;
    padding: 20px;
    background: linear-gradient(135deg, #f3f4f6, #e5e7eb);
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.container {
    width: 100%;
    max-width: 420px;
}

.box {
    background: white;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 16px 40px rgba(0, 0, 0, 0.12);
}

h3 {
    text-align: center;
    margin: 0 0 16px;
    color: #1f2937;
}

hr {
    border: none;
    border-top: 2px dashed #9ca3af;
    margin: 14px 0;
}

input, button {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    font-family: 'Courier New', monospace;
    border-radius: 8px;
    box-sizing: border-box;
}

input {
    border: 1px solid #d1d5db;
    background: #f9fafb;
}

button {
    border: none;
    cursor: pointer;
    font-weight: 700;
    transition: 0.2s;
}

.btn-login {
    background: #1f2937;
    color: white;
}

.btn-login:hover {
    background: #111827;
}

.right {
    text-align: right;
    margin: 8px 0;
    color: #374151;
}

.hidden {
    display: none;
}

#hasil {
    background: #f3f4f6;
    padding: 12px;
    border-radius: 8px;
    line-height: 1.8;
}

.btn-back {
    margin-top: 16px;
    background: #6366f1;
    color: white;
}

.btn-back:hover {
    background: #4f46e5;
}
</style>
</head>

<body>

<div class="container">

    <!-- LOGIN -->
    <div class="box" id="loginBox">
        <h3>LOGIN KASIR</h3>
        <hr>
        <input type="text" id="user" placeholder="Username = kasir">
        <input type="password" id="pass" placeholder="Password = kasir123">
        <button class="btn-login" onclick="login()">Masuk</button>
    </div>

    <!-- KASIR -->
    <div class="box hidden" id="kasirBox">
        <h3>MINI MARKET</h3>
        <p class="right" id="kasir"></p>
        <hr>

        <input type="number" id="tb" placeholder="Total Belanja">
        <button class="btn-login" onclick="hitung()">Cetak Struk</button>

        <hr>
        <div id="hasil"></div>
        <hr>

        <p class="right">Terima kasih 🙏</p>

        <!-- 🔥 FIX: langsung ke index.html -->
        <button class="btn-back" onclick="keIndex()">⬅ Kembali ke Index</button>
    </div>

</div>

<script>
let dataUser = "kasir";
let dataPass = "kasir123";

function login() {
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if (!u || !p) {
        alert("Data belum lengkap");
        return;
    }

    if (u !== dataUser || p !== dataPass) {
        alert("Login gagal");
        location.reload();
        return;
    }

    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("kasirBox").classList.remove("hidden");
    document.getElementById("kasir").innerText = "Kasir: " + u;
}

function hitung() {
    let tb = Number(document.getElementById("tb").value);

    if (tb <= 0) {
        alert("Total belanja tidak valid");
        return;
    }

    let diskon = 0.20;
    let step = 200000;
    let tbMax = 1000000;

    let turun = Math.floor((tbMax - tb) / step);
    diskon -= turun * 0.05;
    if (diskon < 0) diskon = 0;

    let potongan = tb * diskon;
    let bayar = tb - potongan;

    document.getElementById("hasil").innerHTML = `
        TOTAL    : Rp ${tb.toLocaleString()}<br>
        DISKON   : ${(diskon * 100)}%<br>
        POTONGAN : Rp ${potongan.toLocaleString()}<br>
        <b>BAYAR : Rp ${bayar.toLocaleString()}</b>
    `;
}

/* 🔥 FIX NAVIGATION */
function keIndex(){
    window.location.href = "index.html";
}
</script>

</body>
</html>
