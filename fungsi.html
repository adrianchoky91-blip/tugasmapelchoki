<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator Bangun Ruang</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background: radial-gradient(circle at top,#0f172a,#020617);
  color:white;
}

/* HEADER */
.header{
  text-align:center;
  padding:40px 20px 10px;
}

.header h1{
  margin:0;
  font-size:30px;
  color:#38bdf8;
}

.header p{
  opacity:.7;
}

/* NAV */
.nav{
  text-align:center;
  margin-bottom:10px;
}

.btn-back-index{
  display:inline-block;
  padding:10px 18px;
  background:#334155;
  color:white;
  border-radius:10px;
  text-decoration:none;
  transition:.3s;
  font-size:14px;
}

.btn-back-index:hover{
  background:#475569;
  transform:translateY(-2px);
}

/* MENU */
.menu{
  max-width:850px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:16px;
  padding:20px;
}

.card{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  padding:18px;
  border-radius:14px;
  text-align:center;
  cursor:pointer;
  transition:.3s;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 10px 25px rgba(56,189,248,.2);
  border-color:#38bdf8;
}

/* FORM */
.form{
  display:none;
  max-width:520px;
  margin:30px auto;
  background:rgba(255,255,255,.05);
  padding:25px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.1);
}

h2{
  text-align:center;
  color:#38bdf8;
  margin-top:0;
}

input{
  width:100%;
  margin:8px 0;
  padding:12px;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,.08);
  color:white;
  outline:none;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  transition:.3s;
}

.hit{
  background:#38bdf8;
  color:black;
}

.hit:hover{
  background:#0ea5e9;
}

.back{
  background:#475569;
  color:white;
}

.back:hover{
  background:#64748b;
}

/* HASIL */
.hasil{
  margin-top:15px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
  color:#22d3ee;
}
</style>
</head>

<body>

<div class="header">
  <h1>Kalkulator Bangun Ruang</h1>
  <p>Pilih bangun, isi data, langsung hitung</p>
</div>

<div class="nav">
  <a class="btn-back-index" href="index.html">⬅ Kembali ke Index</a>
</div>

<!-- MENU -->
<div id="menu" class="menu">

  <div class="card" onclick="openForm('segitiga')">Segitiga</div>
  <div class="card" onclick="openForm('kerucutV')">Kerucut Volume</div>
  <div class="card" onclick="openForm('bolaL')">Bola Luas</div>
  <div class="card" onclick="openForm('bolaV')">Bola Volume</div>
  <div class="card" onclick="openForm('kubus')">Kubus</div>
  <div class="card" onclick="openForm('kerucutL')">Kerucut Luas</div>

</div>

<!-- FORM -->
<div id="formBox" class="form">

  <h2 id="judul"></h2>

  <div id="inputArea"></div>

  <button class="hit" onclick="hitung()">Hitung</button>
  <button class="back" onclick="backMenu()">Kembali</button>

  <div id="hasil" class="hasil"></div>

</div>

<script>
let mode="";

function openForm(type){
  mode=type;
  document.getElementById("menu").style.display="none";
  document.getElementById("formBox").style.display="block";

  let j=document.getElementById("judul");
  let i=document.getElementById("inputArea");

  if(type==="segitiga"){
    j.innerText="Luas Segitiga";
    i.innerHTML=`
      <input id="a" placeholder="Alas">
      <input id="t" placeholder="Tinggi">
    `;
  }

  if(type==="kerucutV"){
    j.innerText="Volume Kerucut";
    i.innerHTML=`
      <input id="r" placeholder="Jari-jari">
      <input id="t" placeholder="Tinggi">
    `;
  }

  if(type==="bolaL"){
    j.innerText="Luas Bola";
    i.innerHTML=`<input id="r" placeholder="Jari-jari">`;
  }

  if(type==="bolaV"){
    j.innerText="Volume Bola";
    i.innerHTML=`<input id="r" placeholder="Jari-jari">`;
  }

  if(type==="kubus"){
    j.innerText="Volume Kubus";
    i.innerHTML=`<input id="s" placeholder="Sisi">`;
  }

  if(type==="kerucutL"){
    j.innerText="Luas Kerucut";
    i.innerHTML=`
      <input id="r" placeholder="Jari-jari">
      <input id="s" placeholder="Garis Pelukis">
    `;
  }
}

function backMenu(){
  document.getElementById("menu").style.display="grid";
  document.getElementById("formBox").style.display="none";
  document.getElementById("hasil").innerHTML="";
}

function hitung(){
  let h=document.getElementById("hasil");
  let val=0;

  if(mode==="segitiga"){
    val=0.5*a.value*t.value;
    h.innerHTML="Luas = "+val.toFixed(2);
  }

  if(mode==="kerucutV"){
    val=(1/3)*Math.PI*r.value*r.value*t.value;
    h.innerHTML="Volume = "+val.toFixed(2);
  }

  if(mode==="bolaL"){
    val=4*Math.PI*r.value*r.value;
    h.innerHTML="Luas = "+val.toFixed(2);
  }

  if(mode==="bolaV"){
    val=(4/3)*Math.PI*r.value*r.value*r.value;
    h.innerHTML="Volume = "+val.toFixed(2);
  }

  if(mode==="kubus"){
    val=s.value*s.value*s.value;
    h.innerHTML="Volume = "+val.toFixed(2);
  }

  if(mode==="kerucutL"){
    val=Math.PI*r.value*(r.value+s.value);
    h.innerHTML="Luas = "+val.toFixed(2);
  }
}
</script>

</body>
</html>
